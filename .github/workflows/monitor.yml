name: Plan A monitor

on:
  schedule:
    # note: GitHub schedules are best-effort and heavily throttled (2-3h gaps
    # observed). An external pinger hits workflow_dispatch every 5 min for the
    # real cadence; this cron is the fallback. Offset from :00 to dodge the
    # top-of-hour stampede.
    - cron: "2-57/5 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "normal = regular run · selftest = sample alerts, no state changes · stresstest = synthetic burst through the full pipeline, pings operator only · stresstest-clean = remove the burst"
        type: choice
        default: normal
        options: [normal, selftest, stresstest, stresstest-clean]

concurrency:
  group: plan-a-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync to branch tip
        # checkout pins the commit SHA snapshotted when the run was QUEUED.
        # A run queued while another was still executing (pinger + cron
        # overlap) starts WITHOUT the previous run's alerted.json and
        # re-pings the same post (duplicate alerts on 2026-07-20). Pull the
        # real tip first; if that fails, run from the snapshot as before.
        run: git pull --ff-only origin main || echo "::warning::could not sync to branch tip; running from queued snapshot"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - name: Run monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_BEARER_TOKEN:    ${{ secrets.X_BEARER_TOKEN }}
          REDDIT_CLIENT_ID:  ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          WATCHLIST_YAML: ${{ secrets.WATCHLIST_YAML }}
          SLACK_ERROR_NOTIFY: ${{ secrets.SLACK_ERROR_NOTIFY }}
          SLACK_RESPOND_NOTIFY: ${{ secrets.SLACK_RESPOND_NOTIFY }}
        run: python planamonitor.py --config config.cloud.yaml ${{ inputs.mode == 'selftest' && '--selftest' || inputs.mode == 'stresstest' && '--stresstest' || inputs.mode == 'stresstest-clean' && '--stresstest-clean' || '' }}
      - name: Save state + dashboard data
        run: |
          git config user.name  "plan-a-monitor"
          git config user.email "actions@users.noreply.github.com"
          # add one file at a time: some state files don't exist until their
          # feature first fires, and a single missing pathspec makes git add
          # stage NOTHING (which silently froze the dashboard on 2026-07-02)
          for f in seen_ids.json alerted.json run_history.json timeseries.json warned.json digest_state.json health_state.json mentions.json news_clusters.json retag_state.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          if git diff --staged --quiet; then
            echo "no state changes"
          else
            git commit -m "monitor state $(date -u +%FT%TZ)"
            # two near-simultaneous runs (pinger + manual click) can race on
            # this push. Dropping the commit is NOT harmless — it carries
            # alerted.json, and losing that re-pings the same post next run
            # (the 2026-07-20 duplicate). Retry the rebase+push; on conflict
            # keep OUR side (-X theirs replays our commit's version, and our
            # commit only touches state files this run just computed).
            pushed=""
            for i in 1 2 3; do
              if git pull --rebase --autostash -X theirs && git push; then
                pushed=yes; echo "state pushed"; break
              fi
              git rebase --abort 2>/dev/null || true
              sleep 3
            done
            if [ -z "$pushed" ]; then
              echo "::warning::state push failed after 3 attempts; this run's alert-dedup state is lost"
            fi
          fi
