  - didn't happen
  - didn't come true
  - already wrong
  - hasn't happened
  - debunked
  - aged poorly
  - doomer
  - fearmonger
  - grift
  - cult
  - wrong again
  - 2027 didn't
  alert_count: 8
- label: too-close-to-labs
  keywords:
  - captured
  - shill
  - lab propaganda
  - regulatory capture
  - industry
  alert_count: 6
- label: unrealistic-plan
  keywords:
  - unrealistic
  - naive
  - never happen
  - fantasy
  - utopian
  - won't work
  alert_count: 8
- label: unscientific
  keywords:
  - unscientific
  - too many assumptions
  - not rigorous
  - pseudoscience
  - straight line
  - no evidence
  - made up
  - just a story
  - sci-fi
  - science fiction
  alert_count: 8
- label: ignores-china
  keywords:
  - not taking china
  - ignores china
  - naive about china
  - china won't
  alert_count: 6
- label: sensational-name
  keywords:
