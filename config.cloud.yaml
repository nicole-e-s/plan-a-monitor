thresholds:
  twitter:
    likes: 25
    reposts: 8
    author_followers: 20000
    # A single tweet clearing this many impressions is "worth addressing" on
    # its own, even from a non-watchlist account. Starting guess — calibrate on
    # live traffic. (Edit this number in the GitHub web UI to tune sensitivity.)
    impressions: 10000
  reddit:
    score: 15
    num_comments: 10
  hackernews:
    points: 20
    num_comments: 15
spike_factor: 3.0
cluster_alert_count: 6
neg_surge_count: 5
escalate_factor: 4.0
# --- slow-building narrative detection ---
# Besides the per-window alert_count above, a narrative also WARNs when its
# TOTAL mentions over the last narrative_build_days reach 3x its alert_count
# (override per narrative with build_count). Catches a drip of criticism that
# never spikes in any single 5-minute window.
narrative_build_days: 3
narrative_build_cooldown_hours: 12   # don't re-warn about the same build more often than this
# --- once-a-day summary post (grey, no pings) ---
daily_digest:
  enabled: true
  hour_utc: 23   # 23:00 UTC = 4 PM PDT (daylight time; set to 0 for 4 PM PST in winter)
sources:
  hackernews:
    enabled: true
  reddit:
    enabled: false
    client_id: FILL IN
    client_secret: FILL IN
    user_agent: plan-a-monitor by u/yourusername
  reddit_rss:
    # Public Reddit search RSS — needs NO app/credentials (the official API is
    # now approval-gated). May get IP-blocked when run from GitHub Actions; if
    # so, the run log shows "[Reddit-RSS] error" and we fall back to no Reddit.
    enabled: true
  twitter:
    enabled: false
    bearer_token: FILL IN
    max_results: 100
  news:
    enabled: true
    min_tier: 2
    pickup_threshold: 5
    tier1_outlets:
    - New York Times
    - Washington Post
    - Wall Street Journal
    - Bloomberg
    - Financial Times
    - The Economist
    - Reuters
    - Associated Press
    - The Atlantic
    - The New Yorker
    - Politico
    - Axios
    - NPR
    - TIME
    - The Guardian
    - BBC
    - CNN
    - CNBC
    - Vox
    - WIRED
    - MIT Technology Review
    - The Verge
    - Forbes
    - The Information
    tier2_outlets:
    - TechCrunch
    - Ars Technica
    - VentureBeat
    - Semafor
    - The Hill
    - Business Insider
    - Fortune
    - The Times
    - Fox News
    - Slate
    - The Verge
llm:
  enabled: true
  provider: anthropic
  api_key: ''
  # Cheap/fast model for the bulk relevance + sentiment pass:
  model: claude-haiku-4-5-20251001
  # Higher-fidelity model used ONLY to re-judge high-stakes items (negative /
  # mixed sentiment or substantive critiques) — the posts that drive CRITICAL /
  # WARNING alerts. Leave blank ('') to turn the second pass off.
  escalate_model: claude-sonnet-5
  batch_size: 15
mode: alerts
slack:
  webhook_url: ''
  digest_title: "Plan A \u2014 public response monitor"
  # Slack member ID pinged when the monitor errors out or silently degrades
  # (e.g. the AI model fails and it falls back to keyword-only sentiment):
  error_notify: U0BED0HLDLL
  # People pinged for WARNING alerts + influential positive/neutral posts —
  # i.e. anything "we should respond to." Slack member IDs (not @names):
  respond_notify:
  - U08QWKU8CJY   # Lauren Mangla
  - U08PH68S2AU   # Nicole Sanna
lookback_hours: 1
# Per-source lookback overrides:
twitter_lookback_minutes: 10      # keep X reads cheap (pay-per-use): small overlap with the 5-min cron
reddit_rss_lookback_hours: 6
substack_lookback_hours: 24       # blog posts are infrequent; dedupe stops re-alerts
# Substack / personal-blog RSS feeds, one per watchlist person (author is forced
# to the name so the watchlist matcher fires). Add/remove in the GitHub web UI.
