  - overexposed
  alert_count: 6
# When does a SINGLE post deserve its own alert? A post pings if it clears
# ANY ONE of these bars. (Small posts still count toward the dashboard +
# surge/narrative detection no matter what — these numbers only gate pings.)
# Edit the numbers right here in the GitHub web UI to tune sensitivity:
# higher numbers = fewer pings. Set per comms 2026-07-02.
thresholds:
  twitter:
    likes: 500
    reposts: 50
    author_followers: 150000   # a "key figure"-sized account
    impressions: 100000        # views — the primary "worth addressing" bar
  reddit:
    score: 15
    num_comments: 10
  hackernews:
    points: 20
    num_comments: 15
spike_factor: 3.0
# A volume spike needs at least this many mentions in one run before it can
# warn — stops "24x normal" false alarms when normal is close to zero.
spike_min_mentions: 10
# A theme cluster of small posts warns only when it's this big AND mostly
# negative (>= neg_surge_share). Positive/neutral chatter goes to the
# dashboard, not to a ping.
cluster_alert_count: 6
# Negativity surge warns only when a window has BOTH at least neg_surge_count
# negatives AND negatives make up at least neg_surge_share of the window.
# The share test is what keeps a loud-but-proportionate launch day from
# pinging every 5 minutes; a real sentiment shift still fires.
neg_surge_count: 5
neg_surge_share: 0.4
# After a surge warning, wait this long before re-warning (the team already
# knows). Critical single-post alerts ignore this cooldown.
neg_surge_cooldown_hours: 2
# A volume spike PINGS (orange warning) only when negatives are at least this
# share of the window; otherwise it posts as a quiet no-ping notice.
spike_negative_share: 0.25
escalate_factor: 4.0
# --- slow-building narrative detection ---
# Besides the per-window alert_count above, a narrative also WARNs when its
# TOTAL mentions over the last narrative_build_days reach 3x its alert_count
# (override per narrative with build_count). Catches a drip of criticism that
# never spikes in any single 5-minute window.
narrative_build_days: 3
narrative_build_cooldown_hours: 12   # don't re-warn about the same build more often than this
# --- once-a-day summary post (grey, no pings) ---
daily_digest:
  enabled: true
  hour_utc: 23   # 23:00 UTC = 4 PM PDT (daylight time; set to 0 for 4 PM PST in winter)
sources:
  hackernews:
    enabled: true
  reddit:
    enabled: false
    client_id: FILL IN
    client_secret: FILL IN
    user_agent: plan-a-monitor by u/yourusername
  reddit_rss:
    # Public Reddit search RSS — needs NO app/credentials (the official API is
    # now approval-gated). May get IP-blocked when run from GitHub Actions; if
    # so, the run log shows "[Reddit-RSS] error" and we fall back to no Reddit.
    enabled: true
  twitter:
    enabled: false
    bearer_token: FILL IN
    max_results: 100
  news:
    enabled: true
    min_tier: 2
    pickup_threshold: 5
    tier1_outlets:
    - New York Times
    - Washington Post
    - Wall Street Journal
    - Bloomberg
    - Financial Times
    - The Economist
    - Reuters
    - Associated Press
    - The Atlantic
    - The New Yorker
    - Politico
    - Axios
    - NPR
    - TIME
    - The Guardian
    - BBC
    - CNN
    - CNBC
    - Vox
    - WIRED
    - MIT Technology Review
    - The Verge
    - Forbes
    - The Information
    tier2_outlets:
    - TechCrunch
    - Ars Technica
    - VentureBeat
    - Semafor
    - The Hill
    - Business Insider
    - Fortune
    - The Times
    - Fox News
    - Slate
    - The Verge
llm:
  enabled: true
  provider: anthropic
  api_key: ''
  # Cheap/fast model for the bulk relevance + sentiment pass:
  model: claude-haiku-4-5-20251001
  # Higher-fidelity model used ONLY to re-judge high-stakes items (negative /
  # mixed sentiment or substantive critiques) — the posts that drive CRITICAL /
  # WARNING alerts. Leave blank ('') to turn the second pass off.
  escalate_model: claude-sonnet-5
  batch_size: 15
mode: alerts
slack:
  webhook_url: ''
  digest_title: "Plan A \u2014 public response monitor"
  # Linked from the daily digest \u2014 the browsable log of every mention:
  mentions_log_url: https://nicole-e-s.github.io/plan-a-monitor/mentions.html
  # Slack member IDs are private and come from GitHub Actions secrets:
  #   SLACK_ERROR_NOTIFY   — one member ID, pinged when the monitor errors out
  #                          or silently degrades (health alerts)
  #   SLACK_RESPOND_NOTIFY — comma-separated member IDs, pinged for WARNING
  #                          alerts + influential positive/neutral posts
  error_notify: ''
  respond_notify: []
lookback_hours: 1
# News is pulled at most once per this many minutes (Google 503-throttles
# datacenter IPs at 5-min polling). The news window auto-widens to cover the
# gap, so nothing is missed — headlines just arrive up to an hour later.
news_fetch_interval_minutes: 60
# Only ping the operator about news failures once news has been dark this long
# (individual failed pulls are routine throttling and self-recover):
news_alert_after_hours: 6
# Per-source lookback overrides:
twitter_lookback_minutes: 10      # keep X reads cheap (pay-per-use): small overlap with the 5-min cron
reddit_rss_lookback_hours: 6
substack_lookback_hours: 24       # blog posts are infrequent; dedupe stops re-alerts
# substack_feeds (one blog/newsletter feed per watchlist person) also comes
# from the WATCHLIST_YAML secret — see the watchlist note above.
