search_terms:
- query: AI 2040
  precision: high
- query: AI Futures Project
  precision: high
- query: Daniel Kokotajlo
  precision: high
- query: Eli Lifland
  precision: high
# "low" = a common-ish name/phrase: it only counts when AIFP context words
# appear nearby, and the AI double-checks relevance.
- query: Thomas Larsen
  precision: low
# hashtag form (#AI2040) — the spaced phrase "AI 2040" doesn't match it on X
- query: AI2040
  precision: high
- query: ai-2040.com
  precision: high
# (Scott Alexander is deliberately NOT a search term — his name generates far
#  too many unrelated hits. "Plan A" was removed 2026-07-02 for the same reason.)
# ("Plan A" was removed 2026-07-02 — far too many false positives: "plan a
#  trip", "plan a variety show", etc. "AI 2040"/"ai-2040.com" cover the title.)
- query: AI 2027
  precision: low
context_terms:
- AI Futures
- Kokotajlo
- Lifland
- AI 2027
- AI 2040
- ai-2027.com
- ai-2040.com
- superintelligence
- intelligence explosion
- slowdown
- takeoff
- scenario
# The watchlist (people, handles, weights) and substack_feeds (their blog
# feeds) are INTENTIONALLY NOT in this public file. They live in the GitHub
# Actions secret WATCHLIST_YAML (Settings -> Secrets and variables -> Actions).
# Structure of the secret:
#   watchlist:
#   - name: Person Name
#     handles: ['@handle']
#     weight: critical | high
#   substack_feeds:
#     Person Name: https://their.blog/feed
# For local testing, put the same YAML in watchlist.local.yaml (gitignored).
watchlist: []
narratives:
- label: timelines-wrong
  keywords:
